##### ========== 基本：操作性をVSCode寄りに ==========

# マウス操作有効化（ペイン選択・リサイズ・スクロール）
set -g mouse on

# OSC 52 でシステムクリップボードに自動コピー（tmux 3.2+）
set -s set-clipboard on

# xterm 系ターミナルでクリップボード機能を有効化（iTerm2, Ghostty, Kitty等）
# iTerm2: xterm-256color, Ghostty: xterm-ghostty 両方をカバー
set -as terminal-features ',xterm*:clipboard'

# マウスドラッグで選択 → 自動的にコピー（引数なし = OSC 52 経由）
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel
bind-key -T copy-mode MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel

# ダブルクリックで単語選択 → コピー
bind-key -T copy-mode-vi DoubleClick1Pane select-pane \; send-keys -X select-word \; send-keys -X copy-pipe-and-cancel
bind-key -T copy-mode DoubleClick1Pane select-pane \; send-keys -X select-word \; send-keys -X copy-pipe-and-cancel

# SSH経由でのエスケープシーケンス誤解釈を防止（デフォルト500msは長すぎる）
set -s escape-time 10

# WiFi切替時のフォーカス変更通知による誤入力を防止
set -g focus-events off

# マウススクロール速度調整（デフォルト5行→1行）
bind -T copy-mode WheelUpPane send-keys -X -N 1 scroll-up
bind -T copy-mode WheelDownPane send-keys -X -N 1 scroll-down
bind -T copy-mode-vi WheelUpPane send-keys -X -N 1 scroll-up
bind -T copy-mode-vi WheelDownPane send-keys -X -N 1 scroll-down


##### ========== キーバインド：Prefix（tmuxの基本ショートカット） ==========

# 既定の Prefix (Ctrl-b) をやめる（押しにくいので）
unbind C-b

# Prefix を Ctrl-a に変更（覚えやすく押しやすい）
set -g prefix C-a

# tmuxの中で Ctrl-a を単体で送れるようにする（ネスト対策など）
bind C-a send-prefix


##### ========== インデックス：番号を1始まりに ==========

# ウィンドウ番号を 1 から始める（0始まりは混乱しがち）
set -g base-index 1

# ペイン番号も 1 から始める
setw -g pane-base-index 1


##### ========== 分割：覚えやすいショートカット ==========

# | で左右分割（horizontal split）
bind | split-window -h

# - で上下分割（vertical split）
bind - split-window -v

# 既定の分割キーは外しておく（誤爆防止）
unbind '"'
unbind %

# r で設定を再読み込み（編集→反映を高速化）
bind r source-file ~/.tmux.conf \; display-message "reloaded!"


##### ========== タブタイトル：Ghosttyのタブに“プロジェクト感”を出す ==========

# ターミナル（Ghostty）のタブタイトル更新を有効化
set -g set-titles on

# タブタイトルを「セッション名:ウィンドウ名」にする
# 例: statusline:dev / vtuber:git
set -g set-titles-string "#S:#W"


##### ========== “裏で動いた”の可視化：VSCodeの通知っぽい挙動 ==========

# フォーカスしていないウィンドウで出力があったら「アクティビティ」として扱う
# → 下のステータスバーで印が付いて、どこが動いたか分かる
setw -g monitor-activity on

# アクティビティが起きたら画面でも通知（ステータスメッセージ等）
set -g visual-activity on


##### ========== ベル：タスク完了・失敗などを“気づける”ように ==========

# ウィンドウ内で BEL(\a) が鳴ったら検知する
setw -g monitor-bell on

# ベルが鳴ったときの扱い
# current = 現在のウィンドウでベルが鳴った時のみ通知（他タブへの伝播を防止）
set -g bell-action current

# ★重要：Ghosttyタブ🔔に伝えるため、ベルを"端末にも通す"
# hookでベルを送るのでvisual-bellは画面表示のみに（bothだとベルが2回鳴る）
set -g visual-bell on


##### ========== Ghosttyタブ🔔へ伝播：tmux内イベントを外側TTYへ再送 ==========

# tmux内でベルが鳴ったら、外側ターミナル（Ghostty）へもBELを送る
# Claude Code専用にするためコメントアウト（notify.shから直接Ghosttyへ送信）
# set-hook -g alert-bell 'run-shell "printf \a > #{client_tty}"'

# （任意）出力があった=activityでも同じように外へベルを送る
# 関係ないタブにベルが付く原因になるためコメントアウト
# set-hook -g alert-activity 'run-shell "printf \a > #{client_tty}"'


##### ========== ペインタイトル：VSCodeの分割ペイン見出し風 ==========

# ペイン枠の上にタイトル行を表示
set -g pane-border-status top

# 表示する内容（ペインタイトル）
# tproj では auto-focus の時刻を @last_focus_at に載せる。
# tmux の条件式はカンマ区切りなので、style 指定もカンマなしで分割して書く。
set -g pane-border-format "#{?pane_active,#[bg=colour236]#[fg=colour51]#[bold]▶ #[fg=colour255]#{pane_title}#{?#{@last_focus_at}, #[fg=colour243]#{@last_focus_at}#[default],},#{?#{==:#{@pane_rank},prev1},#[bg=colour237]#[fg=colour211]▶ #[fg=colour211]#{pane_title}#{?#{@last_focus_at}, #[fg=colour243]#{@last_focus_at}#[default],},#{?#{==:#{@pane_rank},prev2},#[bg=colour237]#[fg=colour175]  #{pane_title}#{?#{@last_focus_at}, #[fg=colour243]#{@last_focus_at}#[default],},#[bg=colour238]#[fg=colour255]  #{pane_title}#{?#{@last_focus_at}, #[fg=colour243]#{@last_focus_at}#[default],}}}}#[default]"


##### ========== ペインボーダー色：アクティブを目立たせる ==========

# 非アクティブペインのボーダー（背景画像に埋もれない明るさへ）
set -g pane-border-style fg=colour248

# アクティブペインのボーダー（明るいシアン/グリーン）
set -g pane-active-border-style fg=colour51,bold


##### ========== ペイン背景色：非アクティブを暗くする ==========

# 非アクティブペインも透過背景を維持しつつ、文字を少し白寄りにして可読性を保つ
set -g window-style fg=colour255,bg=terminal

# アクティブペインは透過背景のまま通常コントラスト
set -g window-active-style fg=default,bg=terminal


##### ========== ステータスバー：最低限見やすく ==========

# ステータス更新頻度（秒）
set -g status-interval 1

# 左右の表示領域の最大幅（長いプロジェクト名でも崩れにくい）
set -g status-left-length 40
set -g status-right-length 80

# 左側：セッション名（=プロジェクト名）
set -g status-left " #S "

# 右側：日時（作業ログの目安に便利）
set -g status-right " %Y-%m-%d %H:%M "


##### ========== Ghosttyタブ用：粘着🔔フラグ ==========

# タブタイトル更新を有効化
set -g set-titles on

# @cc_alert が 1 の間だけ、タイトル先頭に🔔を付ける（Ghosttyの内蔵🔔ではなく“文字”なので消えない）
set -g set-titles-string "#{?@cc_alert,🔔 ,}#S:#W"

# 手動で🔔を消すショートカット（C-a u）
bind u set -gq @cc_alert 0 \; refresh-client -S \; display-message "🔕 cleared"


##### ========== セッション終了 ==========

# Prefix + k で現在のセッションを終了（確認付き）
bind k confirm-before -p "Kill session #S? (y/n)" kill-session


##### ========== yazi トグル ==========

# Prefix + y でアクティブな列の yazi をトグル（単一/マルチプロジェクトモード両対応）
bind y run-shell "~/bin/tproj-toggle-yazi '#{session_name}' '#{pane_id}'"


##### ========== コピーモード：誤爆しやすいキーを無効化 ==========

# f/t/F/T の文字ジャンプを無効化（マウススクロールでコピーモードに入った際の誤爆防止）
unbind -T copy-mode f
unbind -T copy-mode t
unbind -T copy-mode F
unbind -T copy-mode T
unbind -T copy-mode-vi f
unbind -T copy-mode-vi t
unbind -T copy-mode-vi F
unbind -T copy-mode-vi T

# go to line / window index jump 系の下部プロンプトを無効化
unbind -T copy-mode g
unbind -T copy-mode-vi :
unbind -T prefix "'"

# tproj の多ペイン運用で誤爆しやすい UI を無効化
unbind -T prefix q
unbind -T prefix s
unbind -T prefix w
unbind -T root MouseDown3Pane
unbind -T root MouseDown3Status
unbind -T root MouseDown3StatusLeft
unbind -T root M-MouseDown3Pane
unbind -T root M-MouseDown3Status
unbind -T root M-MouseDown3StatusLeft
